<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Compagnon stoïcien</title>
<meta name="theme-color" content="#14161d" />
<meta name="description" content="Suivi quotidien, citation du jour, exercices et journal stoïcien." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/favicon-64.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#14161d; --ink2:#1b1e27; --card:#222632; --line:#2f3441;
  --marble:#ece6d8; --muted:#938c7c; --brass:#c9a24b; --brass-dim:#8a6f31;
  --brass-soft:rgba(201,162,75,.14);
  --bg-top:#1f2330; --nav-bg:rgba(20,22,29,.92);
  --prem-bg:linear-gradient(160deg,#23202a,#1b1922); --prem-border:#3a2f3f;
  --prem-accent:#c98ab0; --prem-accent-soft:rgba(201,138,176,.12); --prem-btn-border:#4a3d4f;
}
:root[data-theme="light"]{
  --ink:#efe8d8; --ink2:#faf5ea; --card:#faf5ea; --line:#e2d8c2;
  --marble:#2b2620; --muted:#7c7464; --brass:#9a7619; --brass-dim:#c2a564;
  --brass-soft:rgba(154,118,25,.12);
  --bg-top:#f8f3e7; --nav-bg:rgba(250,245,234,.9);
  --prem-bg:linear-gradient(160deg,#f4ece6,#efe3ea); --prem-border:#e0cdd8;
  --prem-accent:#8e4f75; --prem-accent-soft:rgba(142,79,117,.1); --prem-btn-border:#d8c3cf;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:radial-gradient(120% 70% at 50% -10%, var(--bg-top) 0%, var(--ink) 55%) fixed;
  color:var(--marble);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background-color .3s ease, color .3s ease;
}
#app{position:fixed; inset:0; display:flex; flex-direction:column;}
#main{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
.page{max-width:560px; margin:0 auto; padding:28px 22px 40px;}

.head{margin-bottom:22px; position:relative;}
.theme-toggle{position:absolute; top:0; right:0; width:40px; height:40px; border-radius:50%; background:var(--ink2); border:1px solid var(--line); color:var(--brass); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s;}
.theme-toggle:active{transform:scale(.92);}
.eyebrow{font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--brass); margin-bottom:8px;}
.greet{font-family:'Fraunces',Georgia,serif; font-weight:500; font-size:30px; line-height:1.1; letter-spacing:.2px;}

.quote{position:relative; background:var(--ink2); border:1px solid var(--line); border-radius:14px; padding:26px 24px 20px; margin-bottom:22px; overflow:hidden;}
.quote::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--brass),var(--brass-dim));}
.quote-mark{position:absolute; top:-6px; right:16px; font-family:'Fraunces',serif; font-size:80px; color:var(--brass-soft); line-height:1; pointer-events:none;}
.quote-text{font-family:'Fraunces',Georgia,serif; font-style:italic; font-size:19px; line-height:1.5; margin-bottom:14px;}
.quote-author{font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);}

.stat-row{display:flex; gap:12px; margin-bottom:30px;}
.stat{flex:1; background:var(--ink2); border:1px solid var(--line); border-radius:12px; padding:16px 18px;}
.stat-num{display:block; font-family:'Fraunces',serif; font-weight:600; font-size:34px; line-height:1; color:var(--brass);}
.stat-den{font-size:18px; color:var(--muted);}
.stat-label{font-size:12px; color:var(--muted); margin-top:6px; display:block;}

.section-title{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:16px; font-weight:600;}

.meridian{margin-bottom:26px;}
.moment{display:flex; gap:16px;}
.rail{display:flex; flex-direction:column; align-items:center; flex:0 0 auto;}
.node{width:30px; height:30px; border-radius:50%; border:1.5px solid var(--brass-dim); background:var(--ink); color:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .25s ease; margin-top:4px;}
.moment.is-done .node{background:var(--brass); border-color:var(--brass); box-shadow:0 0 0 5px var(--brass-soft);}
.line{flex:1; width:1.5px; background:var(--line); margin:6px 0;}
.moment-card{text-align:left; background:transparent; border:none; cursor:pointer; padding:2px 0 24px; color:inherit; display:flex; flex-direction:column; flex:1;}
.moment-when{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brass); margin-bottom:5px;}
.moment-title{font-family:'Fraunces',serif; font-size:18px; font-weight:500; margin-bottom:6px;}
.moment.is-done .moment-title{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--brass-dim);}
.moment-body{font-size:14px; line-height:1.55; color:var(--muted);}

.prem{background:var(--prem-bg); border:1px solid var(--prem-border); border-radius:14px; padding:20px 22px;}
.prem-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.prem-tag{font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--prem-accent); background:var(--prem-accent-soft); padding:4px 9px; border-radius:20px;}
.prem-when{font-size:11px; color:var(--muted);}
.prem-title{font-family:'Fraunces',serif; font-size:18px; font-weight:500; margin-bottom:8px;}
.prem-body{font-size:14px; line-height:1.55; color:var(--muted); margin-bottom:16px;}
.prem-btn{width:100%; padding:11px; border-radius:10px; cursor:pointer; background:transparent; border:1px solid var(--prem-btn-border); color:var(--marble); font-family:inherit; font-size:14px; transition:all .2s;}
.prem.is-done .prem-btn{background:var(--brass-soft); border-color:var(--brass); color:var(--brass);}

.help{font-size:14px; line-height:1.6; color:var(--muted); margin-bottom:22px;}
.capture{background:var(--ink2); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:32px;}
.photo-btn{width:100%; display:flex; flex-direction:column; align-items:center; gap:10px; padding:30px; border:1.5px dashed var(--brass-dim); border-radius:12px; background:var(--brass-soft); color:var(--brass); cursor:pointer; font-family:inherit; font-size:15px; transition:all .2s;}
.preview-wrap{position:relative;}
.preview{width:100%; display:block; border-radius:12px;}
.linkbtn{margin-top:10px; background:none; border:none; color:var(--brass); cursor:pointer; font-family:inherit; font-size:13px; text-decoration:underline;}
.orline{text-align:center; color:var(--muted); font-size:12px; margin:16px 0; letter-spacing:1px;}
.textarea{width:100%; background:var(--ink); border:1px solid var(--line); border-radius:10px; padding:14px; color:var(--marble); resize:vertical; font-family:inherit; font-size:15px; line-height:1.5;}
.textarea:focus{outline:none; border-color:var(--brass-dim);}
.textarea::placeholder{color:var(--muted);}
.submit{width:100%; margin-top:16px; padding:14px; border-radius:10px; cursor:pointer; background:var(--brass); border:none; color:var(--ink); font-family:'Fraunces',serif; font-size:16px; font-weight:600; transition:all .2s;}
.submit:disabled{opacity:.45; cursor:default;}
.errmsg{color:#e0907f; font-size:13px; margin-top:12px;}
.disclaimer{font-size:11px; color:var(--muted); margin-top:14px; text-align:center;}

.keybox{margin-top:16px; border-top:1px solid var(--line); padding-top:16px;}
.keyrow{display:flex; gap:8px; align-items:center; margin-top:10px;}
.keyrow input{flex:1; background:var(--ink); border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--marble); font-family:inherit; font-size:13px;}
.keyrow input:focus{outline:none; border-color:var(--brass-dim);}
.minibtn{background:var(--brass-soft); border:1px solid var(--brass-dim); color:var(--brass); border-radius:8px; padding:10px 14px; cursor:pointer; font-family:inherit; font-size:13px; white-space:nowrap;}
.keystatus{font-size:12px; color:var(--muted); display:flex; justify-content:space-between; align-items:center;}
.keystatus b{color:var(--brass); font-weight:600;}
.keytoggle{background:none; border:none; color:var(--brass); cursor:pointer; font-family:inherit; font-size:13px; text-decoration:underline; padding:0;}

.empty{color:var(--muted); font-style:italic; font-size:14px;}
.entries{display:flex; flex-direction:column; gap:10px;}
.entry{background:var(--ink2); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
.entry-head{width:100%; display:flex; justify-content:space-between; align-items:center; padding:15px 18px; background:none; border:none; cursor:pointer; color:inherit;}
.entry-date{font-family:'Fraunces',serif; font-size:16px; margin-right:10px;}
.entry-time{font-size:12px; color:var(--muted);}
.chev{font-size:22px; color:var(--brass); transition:transform .25s; line-height:1;}
.chev.open{transform:rotate(90deg);}
.entry-body{padding:0 18px 18px; border-top:1px solid var(--line);}
.entry-block{margin-top:14px;}
.entry-tag{font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brass); display:block; margin-bottom:6px;}
.entry-trans{font-size:14px; line-height:1.6; color:var(--muted); white-space:pre-wrap; font-style:italic;}
.entry-fb{font-size:14px; line-height:1.65; color:var(--marble); white-space:pre-wrap;}

.ref-list{display:flex; flex-direction:column; gap:14px; margin-bottom:30px;}
.ref-item{background:var(--ink2); border:1px solid var(--line); border-radius:12px; padding:18px 20px;}
.ref-when{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brass);}
.ref-title{font-family:'Fraunces',serif; font-size:18px; font-weight:500; margin:6px 0 8px;}
.ref-body{font-size:14px; line-height:1.6; color:var(--muted);}
.authors{border-top:1px solid var(--line); padding-top:22px;}
.author-line{font-size:14px; line-height:1.7; color:var(--muted);}
.author-line b{color:var(--marble);}

.install-card{display:flex; align-items:center; gap:14px; margin:22px 0 0; padding:16px 18px; border-radius:14px; background:var(--brass-soft); border:1px solid var(--brass-dim);}
.install-text{display:flex; flex-direction:column; flex:1; min-width:0;}
.install-title{font-family:'Fraunces',serif; font-size:16px; font-weight:500; color:var(--marble);}
.install-sub{font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4;}
.install-btn{flex:0 0 auto; background:var(--brass); border:none; color:var(--ink); border-radius:9px; padding:11px 18px; cursor:pointer; font-family:'Fraunces',serif; font-size:15px; font-weight:600;}

.modal-back{position:fixed; inset:0; background:rgba(10,11,15,.72); backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center; z-index:50; padding:0;}
.modal{background:var(--ink2); border:1px solid var(--line); border-radius:18px 18px 0 0; width:100%; max-width:560px; padding:24px 22px calc(28px + env(safe-area-inset-bottom)); animation:slideup .25s ease;}
@keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal h3{font-family:'Fraunces',serif; font-size:20px; font-weight:500; margin-bottom:6px;}
.modal p.lead{font-size:13px; color:var(--muted); margin-bottom:18px; line-height:1.5;}
.modal-step{display:flex; gap:12px; align-items:flex-start; margin-bottom:14px;}
.modal-num{flex:0 0 auto; width:24px; height:24px; border-radius:50%; background:var(--brass-soft); border:1px solid var(--brass-dim); color:var(--brass); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600;}
.modal-step span.txt{font-size:14px; line-height:1.5; color:var(--marble);}
.modal-step .ic{display:inline-flex; vertical-align:-4px; margin:0 3px; color:var(--brass);}
.modal-close{width:100%; margin-top:10px; padding:13px; border-radius:10px; background:transparent; border:1px solid var(--line); color:var(--marble); font-family:inherit; font-size:15px; cursor:pointer;}

nav#nav{display:flex; background:var(--nav-bg); backdrop-filter:blur(12px); border-top:1px solid var(--line); padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
.navbtn{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer; color:var(--muted); font-family:inherit; font-size:11px; padding:8px 4px; transition:color .2s;}
.navbtn.active{color:var(--brass);}

button:focus-visible, textarea:focus-visible, input:focus-visible{outline:2px solid var(--brass); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
<script>
(function(){try{var v=localStorage.getItem('sto-theme');var t=v?JSON.parse(v):null;if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>

<body>
<div id="app">
  <main id="main"></main>
  <nav id="nav" role="tablist" aria-label="Navigation"></nav>
</div>

<script>
/* ----------------------------- Données ----------------------------- */
const QUOTES = [
  {t:"Ce ne sont pas les choses qui nous troublent, mais nos jugements sur les choses.",a:"Épictète"},
  {t:"Tu as pouvoir sur ton esprit, non sur les événements. Comprends-le, et tu trouveras la force.",a:"Marc Aurèle"},
  {t:"Nous souffrons plus souvent en imagination qu'en réalité.",a:"Sénèque"},
  {t:"Ne demande pas que les choses arrivent comme tu le veux ; veux qu'elles arrivent comme elles arrivent, et tu vivras serein.",a:"Épictète"},
  {t:"Ce qui se met en travers du chemin devient le chemin.",a:"Marc Aurèle"},
  {t:"Ce n'est pas l'homme qui a peu qui est pauvre, mais celui qui désire toujours davantage.",a:"Sénèque"},
  {t:"Limite-toi au présent.",a:"Marc Aurèle"},
  {t:"Aucun homme n'est libre s'il n'est pas maître de lui-même.",a:"Épictète"},
  {t:"Commence enfin à vivre, et compte chaque jour comme une vie entière.",a:"Sénèque"},
  {t:"Choisis de ne pas te sentir lésé, et tu ne te sentiras pas lésé.",a:"Marc Aurèle"},
  {t:"Il n'y a pas de vent favorable pour qui ne sait pas où il va.",a:"Sénèque"},
  {t:"Supporte et abstiens-toi.",a:"Épictète"},
  {t:"Le meilleur moyen de te venger est de ne pas ressembler à celui qui t'a blessé.",a:"Marc Aurèle"},
  {t:"La vie est longue si l'on sait s'en servir.",a:"Sénèque"},
  {t:"On ne peut t'offenser sans ton consentement.",a:"Épictète"},
  {t:"Que t'importe ce qu'on dira de toi ? Occupe-toi de ce que tu fais.",a:"Marc Aurèle"},
  {t:"Ce n'est pas parce que les choses sont difficiles que nous n'osons pas ; c'est parce que nous n'osons pas qu'elles sont difficiles.",a:"Sénèque"},
  {t:"Souviens-toi : il te faut peu de chose pour mener une vie heureuse.",a:"Marc Aurèle"},
  {t:"Nul n'est plus malheureux que celui qui n'a jamais affronté l'adversité.",a:"Sénèque"},
  {t:"Tu peux recommencer à voir les choses autrement à l'instant même : là est le recommencement.",a:"Marc Aurèle"},
  {t:"Ce qui dépend de nous est par nature libre ; ce qui n'en dépend pas est fragile et servile.",a:"Épictète"},
  {t:"Chaque jour, attends-toi à rencontrer la mauvaise foi : nul ne peut te nuire vraiment.",a:"Marc Aurèle"},
  {t:"La fortune a tout pouvoir sur les âmes lâches, aucun sur les âmes courageuses.",a:"Sénèque"},
  {t:"Demande-toi à chaque heure : puis-je vivre sans cela ? Tu seras surpris.",a:"Sénèque"}
];
const PRACTICES = [
  {key:"matin",moment:"Matin",title:"Le tri du matin",when:"2 min",body:"Choisis une chose qui t'angoisse aujourd'hui. Qu'est-ce qui dépend de moi, qu'est-ce qui n'en dépend pas ? Mets ton effort sur le premier, relâche le reste."},
  {key:"pause",moment:"Journée",title:"La pause avant la réaction",when:"à chaque contrariété",body:"Repère la phrase que ton esprit ajoute (« c'est insupportable »). C'est une opinion, pas un fait. Suspends-la, puis choisis ta réponse."},
  {key:"soir",moment:"Soir",title:"Le bilan du soir",when:"5 min",body:"Les trois questions de Sénèque, sans complaisance : qu'ai-je mal fait ? qu'ai-je bien fait ? que ferais-je mieux demain ?"}
];
const PREMEDITATIO = {key:"premeditatio",title:"La répétition du pire",when:"2 à 3 fois par semaine",body:"Imagine calmement qu'une chose tourne mal. Demande : qu'est-ce qui dépendrait encore de moi ? Conclus toujours par « et même alors, ça irait ». Ce n'est pas ruminer : ça finit par un retour au contrôle."};

/* ----------------------------- Stockage local ----------------------------- */
const LS = {
  get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch(e){return d;} },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k);}catch(e){} }
};

/* ----------------------------- État ----------------------------- */
const state = {
  tab: "today",
  days: LS.get("sto-days", {}),
  entries: LS.get("sto-entries", []),
  apiKey: LS.get("sto-apikey", ""),
  theme: LS.get("sto-theme", null),
  showKeyEdit: false,
  jPreview: null,
  jBase64: null,
  jText: "",
  jBusy: false,
  jError: null,
};

/* ----------------------------- Utilitaires ----------------------------- */
function dateKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dayOfYear(d){ return Math.floor((d - new Date(d.getFullYear(),0,0))/86400000); }
function frenchDate(d){ return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}); }
function greeting(d){ const h=d.getHours(); return h<12?"Bonjour":h<18?"Bon après-midi":"Bonsoir"; }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ----------------------------- Thème clair / sombre ----------------------------- */
function effectiveTheme(){
  if(state.theme==="light"||state.theme==="dark") return state.theme;
  return (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
}
function applyTheme(){
  const t=effectiveTheme();
  document.documentElement.setAttribute("data-theme", t);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", t==="light" ? "#efe8d8" : "#14161d");
}
function toggleTheme(){
  state.theme = effectiveTheme()==="light" ? "dark" : "light";
  LS.set("sto-theme", state.theme);
  applyTheme();
  renderMain();
}
function themeToggleBtn(){
  const light = effectiveTheme()==="light";
  const sun='<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
  const moon='<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  const label = light ? "Passer en thème sombre" : "Passer en thème clair";
  return `<button class="theme-toggle" data-act-theme="1" aria-label="${label}" title="${label}">${light?moon:sun}</button>`;
}
function computeStreak(days){
  let s=0; const cur=new Date(); const today=dateKey(new Date());
  for(;;){ const k=dateKey(cur); const day=days[k];
    const done = day && (day.matin||day.pause||day.soir||day.premeditatio);
    if(done){ s++; cur.setDate(cur.getDate()-1); }
    else if(k===today){ cur.setDate(cur.getDate()-1); }
    else break;
  } return s;
}
function downscaleImage(file, maxDim=1568){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){ const r=Math.min(maxDim/w,maxDim/h); w=Math.round(w*r); h=Math.round(h*r); }
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg",0.82)); };
      img.onerror=reject; img.src=reader.result; };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

/* ----------------------------- Appel API (clé personnelle) ----------------------------- */
async function getFeedback(key,{imageBase64,text}){
  const instruction =
    "Tu es un guide stoïcien bienveillant et exigeant, qui répond en français. "+
    "On te transmet une réflexion personnelle, manuscrite (photo) ou tapée. "+
    "Ta mission : 1) transcris fidèlement le texte si c'est une image ; "+
    "2) offre un retour stoïcien concret et chaleureux, de 120 à 200 mots, appuyé sur la dichotomie du contrôle, "+
    "la distinction jugement/fait, la premeditatio malorum ou les vertus cardinales selon ce qui est pertinent ; "+
    "termine par une question ou un appui pour demain. "+
    'Réponds UNIQUEMENT par du JSON valide, sans texte autour ni balises : {"transcription":"...","feedback":"..."}. '+
    "Si une image est illisible, mets transcription à \"\" et explique-le doucement dans feedback.";
  const content=[];
  if(imageBase64) content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageBase64}});
  content.push({type:"text",text: text ? instruction+"\n\nVoici le texte tapé :\n"+text : instruction});
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content}]})
  });
  if(!res.ok){ const e=await res.text(); throw new Error(res.status+" "+e.slice(0,120)); }
  const data=await res.json();
  const raw=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
  const clean=raw.replace(/```json/g,"").replace(/```/g,"").trim();
  try{ return JSON.parse(clean); }catch(e){ return {transcription:"",feedback:clean||"Réponse illisible."}; }
}

/* ----------------------------- Persistance helpers ----------------------------- */
function saveDays(){ LS.set("sto-days", state.days); }
function saveEntries(){ LS.set("sto-entries", state.entries); }
function toggle(key){
  const k=dateKey(new Date());
  const cur=Object.assign({}, state.days[k]||{});
  cur[key]=!cur[key];
  state.days[k]=cur; saveDays(); renderMain();
}

/* ----------------------------- Rendu : Aujourd'hui ----------------------------- */
function pageToday(){
  const today=new Date();
  const ts=state.days[dateKey(today)]||{};
  const q=QUOTES[dayOfYear(today)%QUOTES.length];
  const streak=computeStreak(state.days);
  const done=PRACTICES.filter(p=>ts[p.key]).length;
  const moments=PRACTICES.map((p,i)=>`
    <div class="moment ${ts[p.key]?"is-done":""}" data-key="${p.key}">
      <div class="rail">
        <button class="node" data-toggle="${p.key}" aria-pressed="${!!ts[p.key]}" aria-label="${esc(p.title)}">
          ${ts[p.key]?'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>':""}
        </button>
        ${i<PRACTICES.length-1?'<span class="line"></span>':""}
      </div>
      <button class="moment-card" data-toggle="${p.key}">
        <span class="moment-when">${esc(p.moment)} · ${esc(p.when)}</span>
        <span class="moment-title">${esc(p.title)}</span>
        <span class="moment-body">${esc(p.body)}</span>
      </button>
    </div>`).join("");
  return `<div class="page">
    <div class="head">
      ${themeToggleBtn()}
      <p class="eyebrow">${esc(frenchDate(today))}</p>
      <h1 class="greet">${greeting(today)}.</h1>
    </div>
    <section class="quote" aria-label="Citation du jour">
      <span class="quote-mark">“</span>
      <p class="quote-text">${esc(q.t)}</p>
      <p class="quote-author">${esc(q.a)}</p>
    </section>
    <div class="stat-row">
      <div class="stat"><span class="stat-num">${streak}</span><span class="stat-label">${streak>1?"jours de suite":"jour de pratique"}</span></div>
      <div class="stat"><span class="stat-num">${done}<span class="stat-den"> / 3</span></span><span class="stat-label">aujourd'hui</span></div>
    </div>
    <h2 class="section-title">L'arc du jour</h2>
    <div class="meridian">${moments}</div>
    <div class="prem ${ts.premeditatio?"is-done":""}">
      <div class="prem-head"><span class="prem-tag">Exercice intense</span><span class="prem-when">${esc(PREMEDITATIO.when)}</span></div>
      <h3 class="prem-title">${esc(PREMEDITATIO.title)}</h3>
      <p class="prem-body">${esc(PREMEDITATIO.body)}</p>
      <button class="prem-btn" data-toggle="premeditatio">${ts.premeditatio?"✓ Pratiqué aujourd'hui":"Marquer comme pratiqué"}</button>
    </div>
    ${installUI()}
  </div>`;
}

function isStandalone(){
  return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone === true;
}
function isIOS(){
  const ua = navigator.userAgent || "";
  return /iphone|ipad|ipod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}
function installUI(){
  if(isStandalone()) return ""; // déjà installée : rien à proposer
  return `<div class="install-card">
    <div class="install-text">
      <span class="install-title">Installer le compagnon</span>
      <span class="install-sub">Plein écran, hors-ligne, depuis ton écran d'accueil.</span>
    </div>
    <button class="install-btn" data-act-install="go">Installer</button>
  </div>`;
}

/* ----------------------------- Rendu : Journal ----------------------------- */
function pageJournal(){
  const hasKey=!!state.apiKey;
  const preview = state.jPreview
    ? `<div class="preview-wrap"><img class="preview" src="${state.jPreview}" alt="Aperçu de ta page"/></div><button class="linkbtn" data-act="clearimg">Changer la photo</button>`
    : `<button class="photo-btn" data-act="pick"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3.5"/></svg><span>Photographier ma page</span></button>`;
  const keySection = hasKey && !state.showKeyEdit
    ? `<div class="keybox"><div class="keystatus"><span>Retours IA <b>activés</b></span><button class="keytoggle" data-act="editkey">Modifier la clé</button></div></div>`
    : `<div class="keybox">
         <div class="keystatus"><span>${hasKey?"Modifier ta clé Anthropic":"Activer les retours IA (optionnel)"}</span>${hasKey?'<button class="keytoggle" data-act="canceledit">Annuler</button>':""}</div>
         <div class="keyrow">
           <input id="keyInput" type="password" placeholder="Clé API Anthropic (sk-ant-…)" value="${esc(state.apiKey)}" autocomplete="off"/>
           <button class="minibtn" data-act="savekey">Enregistrer</button>
         </div>
         <p class="disclaimer">La clé reste sur cet appareil uniquement. Sans clé, tes notes sont quand même sauvegardées — simplement sans retour.</p>
       </div>`;
  const entries = state.entries.length===0
    ? `<p class="empty">Rien encore. Ta première page t'attend.</p>`
    : `<div class="entries">${state.entries.map(en=>{
        const d=new Date(en.date);
        const label=d.toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
        const time=d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
        return `<div class="entry" data-id="${en.id}">
          <button class="entry-head" data-act="toggleentry" data-id="${en.id}">
            <div><span class="entry-date">${label}</span><span class="entry-time">${time}</span></div>
            <span class="chev ${en._open?"open":""}">›</span>
          </button>
          ${en._open?`<div class="entry-body">
            ${en.transcription?`<div class="entry-block"><span class="entry-tag">${en.hadImage?"Transcription":"Ta note"}</span><p class="entry-trans">${esc(en.transcription)}</p></div>`:""}
            ${en.feedback?`<div class="entry-block"><span class="entry-tag">Retour</span><p class="entry-fb">${esc(en.feedback)}</p></div>`:`<div class="entry-block"><p class="entry-fb" style="color:var(--muted);font-style:italic">Enregistré sans retour IA.</p></div>`}
          </div>`:""}
        </div>`;
      }).join("")}</div>`;
  return `<div class="page">
    <div class="head">${themeToggleBtn()}<p class="eyebrow">Journal</p><h1 class="greet">Écris, puis relis-toi.</h1></div>
    <p class="help">Prends en photo une page de ton journal manuscrit, ou écris ici. Avec une clé API, tu reçois un retour stoïcien ; sans clé, tes pages sont conservées telles quelles.</p>
    <div class="capture">
      ${preview}
      <div class="orline">ou</div>
      <textarea class="textarea" id="jtext" rows="4" placeholder="Écris une réflexion, une difficulté du jour, une victoire…">${esc(state.jText)}</textarea>
      <button class="submit" id="jsubmit" ${state.jBusy?"disabled":""}>${state.jBusy?"Lecture en cours…":(state.apiKey?"Recevoir un retour":"Enregistrer ma note")}</button>
      ${state.jError?`<p class="errmsg">${esc(state.jError)}</p>`:""}
      ${keySection}
    </div>
    <h2 class="section-title">Tes entrées</h2>
    ${entries}
  </div>`;
}

/* ----------------------------- Rendu : Exercices ----------------------------- */
function pageRef(){
  const all=[...PRACTICES,PREMEDITATIO];
  const items=all.map(p=>`<div class="ref-item"><span class="ref-when">${esc(p.when)}</span><h3 class="ref-title">${esc(p.title)}</h3><p class="ref-body">${esc(p.body)}</p></div>`).join("");
  return `<div class="page">
    <div class="head">${themeToggleBtn()}<p class="eyebrow">Repères</p><h1 class="greet">Les exercices.</h1></div>
    <p class="help">La pratique d'abord, la théorie ensuite. Reviens ici quand un geste se floute.</p>
    <div class="ref-list">${items}</div>
    <div class="authors">
      <p class="section-title">Les trois voix</p>
      <p class="author-line"><b>Épictète</b> — le plus radical et tonifiant.</p>
      <p class="author-line"><b>Sénèque</b> — le plus littéraire et accessible.</p>
      <p class="author-line"><b>Marc Aurèle</b> — le plus intime.</p>
    </div>
  </div>`;
}

/* ----------------------------- Liaison des événements ----------------------------- */
function bindPage(){
  const main=document.getElementById("main");
  // toggles (Aujourd'hui)
  main.querySelectorAll("[data-toggle]").forEach(el=>{
    el.addEventListener("click",()=>toggle(el.getAttribute("data-toggle")));
  });
  // install
  const icard=main.querySelector("[data-act-install]");
  if(icard) icard.addEventListener("click", doInstall);
  // thème
  const tg=main.querySelector("[data-act-theme]");
  if(tg) tg.addEventListener("click", toggleTheme);
  // Journal
  if(state.tab==="journal"){
    const ta=main.querySelector("#jtext");
    if(ta) ta.addEventListener("input", e=>{ state.jText=e.target.value; });
    main.querySelectorAll("[data-act]").forEach(el=>{
      el.addEventListener("click", e=>handleJournalAct(el.getAttribute("data-act"), el));
    });
    const sub=main.querySelector("#jsubmit");
    if(sub) sub.addEventListener("click", submitJournal);
  }
}

function handleJournalAct(act, el){
  if(act==="pick"){
    const inp=document.createElement("input");
    inp.type="file"; inp.accept="image/*"; inp.capture="environment";
    inp.onchange=async ev=>{ const f=ev.target.files&&ev.target.files[0]; if(!f) return;
      try{ const url=await downscaleImage(f); state.jPreview=url; state.jBase64=url.split(",")[1]; state.jError=null; renderMain(); }
      catch(e){ state.jError="Impossible de lire cette image. Réessaie."; renderMain(); } };
    inp.click();
  } else if(act==="clearimg"){ state.jPreview=null; state.jBase64=null; renderMain(); }
  else if(act==="editkey"){ state.showKeyEdit=true; renderMain(); }
  else if(act==="canceledit"){ state.showKeyEdit=false; renderMain(); }
  else if(act==="savekey"){
    const v=document.getElementById("keyInput").value.trim();
    state.apiKey=v; LS.set("sto-apikey", v); state.showKeyEdit=false; renderMain();
  } else if(act==="toggleentry"){
    const id=Number(el.getAttribute("data-id"));
    const en=state.entries.find(x=>x.id===id); if(en){ en._open=!en._open; renderMain(); }
  }
}

async function submitJournal(){
  // capture latest textarea value
  const ta=document.getElementById("jtext"); if(ta) state.jText=ta.value;
  if(!state.jBase64 && !state.jText.trim()) return;
  // Sans clé : on enregistre la note brute.
  if(!state.apiKey){
    state.entries.unshift({id:Date.now(),date:new Date().toISOString(),transcription:state.jText.trim(),feedback:"",hadImage:!!state.jBase64,_open:false});
    saveEntries(); state.jPreview=null; state.jBase64=null; state.jText=""; renderMain(); return;
  }
  state.jBusy=true; state.jError=null; renderMain();
  try{
    const res=await getFeedback(state.apiKey,{imageBase64:state.jBase64,text:state.jText.trim()});
    state.entries.unshift({id:Date.now(),date:new Date().toISOString(),transcription:res.transcription||state.jText.trim(),feedback:res.feedback||"",hadImage:!!state.jBase64,_open:false});
    saveEntries();
    state.jPreview=null; state.jBase64=null; state.jText=""; state.jBusy=false; renderMain();
  }catch(err){
    state.jBusy=false;
    state.jError="Le retour n'a pas pu être généré. Vérifie ta clé et ta connexion.";
    renderMain();
  }
}

/* ----------------------------- Rendu principal ----------------------------- */
function renderMain(){
  const main=document.getElementById("main");
  main.innerHTML = state.tab==="today"?pageToday(): state.tab==="journal"?pageJournal(): pageRef();
  main.scrollTop = main.scrollTop; // garde la position
  bindPage();
}
function renderNav(){
  const nav=document.getElementById("nav");
  const items=[
    {id:"today",label:"Aujourd'hui",icon:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>'},
    {id:"journal",label:"Journal",icon:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>'},
    {id:"ref",label:"Exercices",icon:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h11v13a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V6a2 2 0 0 1 2-2Z"/><path d="M9 8h5M9 12h5"/></svg>'}
  ];
  nav.innerHTML=items.map(it=>`<button class="navbtn ${state.tab===it.id?"active":""}" data-tab="${it.id}" role="tab" aria-selected="${state.tab===it.id}">${it.icon}<span>${it.label}</span></button>`).join("");
  nav.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{ state.tab=b.getAttribute("data-tab"); state.jError=null; renderNav(); renderMain(); }));
}

/* ----------------------------- Install + Service worker ----------------------------- */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt", e=>{ e.preventDefault(); deferredPrompt=e; });
window.addEventListener("appinstalled", ()=>{ deferredPrompt=null; closeInstallHelp(); if(state.tab==="today") renderMain(); });

async function doInstall(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    try{ await deferredPrompt.userChoice; }catch(e){}
    deferredPrompt=null;
    if(state.tab==="today") renderMain();
    return;
  }
  showInstallHelp(); // iOS et navigateurs sans invite native
}

function closeInstallHelp(){ const m=document.getElementById("installModal"); if(m) m.remove(); }
function showInstallHelp(){
  closeInstallHelp();
  const ios=isIOS();
  const shareIcon='<span class="ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m8 7 4-4 4 4"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg></span>';
  const menuIcon='<span class="ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg></span>';
  const steps = ios
    ? [`Touche le bouton Partager ${shareIcon} en bas de Safari.`,
       `Fais défiler, puis choisis « Sur l'écran d'accueil ».`,
       `Confirme avec « Ajouter ». L'icône parchemin apparaît sur ton écran.`]
    : [`Ouvre le menu ${menuIcon} de ton navigateur.`,
       `Choisis « Installer l'application » ou « Ajouter à l'écran d'accueil ».`,
       `Confirme. L'app s'ouvrira ensuite en plein écran.`];
  const back=document.createElement("div");
  back.id="installModal"; back.className="modal-back";
  back.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-label="Installer l'application">
    <h3>Installer l'app</h3>
    <p class="lead">${ios?"Sur iPhone, l'installation se fait en deux gestes depuis Safari.":"En quelques secondes, depuis ton navigateur."}</p>
    ${steps.map((s,i)=>`<div class="modal-step"><span class="modal-num">${i+1}</span><span class="txt">${s}</span></div>`).join("")}
    <button class="modal-close" data-act-close="1">Compris</button>
  </div>`;
  back.addEventListener("click", e=>{ if(e.target===back || e.target.getAttribute("data-act-close")) closeInstallHelp(); });
  document.body.appendChild(back);
}

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

/* ----------------------------- Démarrage ----------------------------- */
applyTheme();
renderNav();
renderMain();
</script>
